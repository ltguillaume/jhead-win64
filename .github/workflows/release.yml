name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: '7 7 */7 * *'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          repository: 'Matthias-Wandel/jhead'

      - name: Check for new version
        run: |
          $lastBuild = try { curl https://api.github.com/repos/ltguillaume/jhead-win64/releases/latest | ConvertFrom-Json | Select -exp tag_name } catch { echo 0 }
          $latestTag = git rev-parse --short HEAD
          if ($lastBuild -eq $latestTag) {
            echo "No new version"
          } else {
            "TAG=$latestTag" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Set up Developer Command Prompt
        if: ${{ env.TAG != '' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build executable
        if: ${{ env.TAG != '' }}
        run: .\make.bat

      - name: Create release
        if: ${{ env.TAG != '' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: '${{ env.TAG }}'
          name: 'JHEAD for Windows (${{ env.TAG }})'
          body: 'Created from https://github.com/Matthias-Wandel/jhead/tree/${{ env.TAG }}'
          files: jhead.exe
