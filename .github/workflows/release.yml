name: Release

on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          repository: 'Matthias-Wandel/jhead'

      - name: Get commit sha for release tag
        run: |
          $commitSha = git rev-parse --short HEAD
          "TAG=$commitSha" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build executable
        run: .\make.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jhead-win64
          path: jhead.exe
          retention-days: 7

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: '${{ env.TAG }}'
          name: 'JHEAD for Windows (${{ env.TAG }})'
          body: 'Created from https://github.com/Matthias-Wandel/jhead/tree/${{ env.TAG }}'
          files: jhead.exe
